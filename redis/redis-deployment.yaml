apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:latest
        resources:
          requests:
            cpu: "2m"
            memory: "5Mi"
          limits:
            cpu: "5m"
            memory: "6Mi"
        ports:
        - containerPort: 6379

